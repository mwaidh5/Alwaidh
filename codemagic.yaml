# Cloud build for the Alwaidh Staff iOS app (no Mac required).
# Codemagic (codemagic.io) runs this on a macOS machine, creates/fetches the
# signing certificate + provisioning profile from your App Store Connect API
# key, builds the app, and uploads it to TestFlight.
#
# The App Store Connect API key must be added in Codemagic (Team settings ->
# Integrations) with the name used below in integrations.app_store_connect.

workflows:
  ios-testflight:
    name: Alwaidh Staff — iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: AppStoreConnect
    environment:
      node: 22
      xcode: latest
      groups:
        # Codemagic app settings -> Environment variables: add a SECURE
        # variable CERTIFICATE_PRIVATE_KEY (the permanent RSA key) in the
        # group "signing" so every build reuses the same certificate.
        - signing
      vars:
        BUNDLE_ID: 'com.alwaidh.staff'
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build the web app
        script: npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Fetch or create signing files
        # Uses the PERMANENT private key from the "signing" env group, so the
        # first run creates one certificate and every later run reuses it —
        # no more running into Apple's 2-certificate limit.
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
      - name: Apply provisioning profile to the Xcode project
        script: xcode-project use-profiles
      - name: Set the build number
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build the signed IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Upload the build only. Internal testers (your App Store Connect team)
        # get every uploaded build automatically with NO beta review. Leaving
        # submit_to_testflight false avoids the external-review step that
        # demands feedback email / reviewer contact info.
        submit_to_testflight: false
