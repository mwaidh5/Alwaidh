# Cloud build for the Alwaidh Staff iOS app (no Mac required).
# Codemagic (codemagic.io) runs this on a macOS machine, creates/fetches the
# signing certificate + provisioning profile from your App Store Connect API
# key, builds the app, and uploads it to TestFlight.
#
# The App Store Connect API key must be added in Codemagic (Team settings ->
# Integrations) with the name used below in integrations.app_store_connect.

workflows:
  ios-testflight:
    name: Alwaidh Staff — iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: AppStoreConnect
    environment:
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: 'com.alwaidh.staff'
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build the web app
        script: npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Fetch or create signing files
        # Generate a fresh private key so a new distribution certificate can be
        # created and saved (the account's existing cert has no local key here).
        # --create also registers the bundle id and creates the App Store profile.
        script: |
          keychain initialize
          openssl genrsa -out "$CM_BUILD_DIR/dist_cert_key.pem" 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:"$CM_BUILD_DIR/dist_cert_key.pem" \
            --create
          keychain add-certificates
      - name: Apply provisioning profile to the Xcode project
        script: xcode-project use-profiles
      - name: Set the build number
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build the signed IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
