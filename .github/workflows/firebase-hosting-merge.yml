# Builds the site and deploys it LIVE whenever a change lands on the main branch.
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALWAIDH_BAEB5 }}
          channelId: live
          projectId: alwaidh-baeb5
      # Publish Firestore & Storage security rules (the hosting action above
      # only deploys the website, not the database rules).
      - name: Deploy Firestore & Storage rules
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/gcp-sa.json"
          npx --yes firebase-tools@latest deploy --only firestore:rules,storage --project alwaidh-baeb5 --non-interactive
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALWAIDH_BAEB5 }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
